<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Frontend</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
</head>

<body>

    <!-- Global Sidebar Toggle -->
    <input type="checkbox" id="sidebar-toggle">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-header">
            <div class="brand-logo">
                <svg class="icon" viewBox="0 0 24 24" style="stroke-width: 1.5;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 2c1.5 0 2.9.4 4.1 1.1L9.8 16.5c-1.8-1-3-2.9-3-5.1 0-2.4 1.4-4.5 3.5-5.5.5-.1 1.1-.2 1.7-.2zm0 16c-1.5 0-2.9-.4-4.1-1.1l6.3-11.4c1.8 1 3 2.9 3 5.1 0 2.4-1.4 4.5-3.5 5.5-.5.1-1.1.2-1.7.2z"
                        fill="currentColor" stroke="none"></path>
                </svg>
            </div>
            <label for="sidebar-toggle" class="sidebar-toggle-btn">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </label>
        </div>

        <div class="nav-section">
            <div class="nav-item" id="new-chat-btn">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span class="nav-text">New chat</span>
            </div>
        </div>

        <div class="chat-history-container">
            <details class="chats-group" open>
                <summary class="chats-summary">
                    Chats
                    <svg class="icon icon-xs chevron-icon" viewBox="0 0 24 24">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </summary>
                <div class="chat-list" id="chat-list">
                </div>
            </details>
        </div>

        <div class="user-profile">
            <div class="avatar">A</div>
            <div class="user-info">
                <span class="user-name">Local Agent</span>
                <span class="user-tag" id="model-tag"></span>
            </div>
        </div>
    </aside>

    <!-- MAIN AREA -->
    <main class="main-area">
        <div class="top-bar">
            <label for="sidebar-toggle" class="main-toggle-btn">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </label>
            <div class="model-display" id="model-display">Agent</div>
        </div>

        <div class="chat-canvas" id="chat-canvas">
            <div class="messages-container" id="messages-container">
            </div>

            <div class="input-wrapper">
                <div class="input-box">
                    <textarea class="input-text" id="input-text" placeholder="Message agent..." rows="1"></textarea>
                    <button class="icon-btn" id="send-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" width="16" height="16">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
